name: Deploy to REG.RU

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Upload site to REG.RU
        shell: bash
        run: |
          rsync -az \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            --exclude='SPEC.md' \
            --exclude='TODO.md' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/u2767403/data/www/xn--80aaarctnodv3agc9d.xn--p1ai/"